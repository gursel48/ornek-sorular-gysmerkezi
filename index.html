<script>
    const allQuestions = Array.isArray(questions) ? questions : [];
    const lessonTitle = "Tarım ve Orman Bakanlığı - Mühendis 2. Grup Deneme";
    const menuContainer = document.getElementById('menuContainer');
    const quizContainer = document.getElementById('quizContainer');
    const menuGrid = document.getElementById('menuGrid');
    const setInfo = document.getElementById('setInfo');

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const statusText = document.getElementById('statusText');
    const remainingCountEl = document.getElementById('remainingCount');
    const explanationEl = document.getElementById('explanation');
    const reaskBadge = document.getElementById('reaskBadge');
    const reviewBanner = document.getElementById('reviewBanner');

    const groupedSets = [];
    for (let startDeneme = 1; startDeneme <= 20; startDeneme += 2) {
        const endDeneme = startDeneme + 1;
        const setQuestions = allQuestions.filter(item => {
            const match = String(item.q).match(/^DENEME-(\d+)\s+/);
            if (!match) return false;
            const denemeNo = parseInt(match[1], 10);
            return denemeNo === startDeneme || denemeNo === endDeneme;
        });
        groupedSets.push({
            key: `set_${((startDeneme + 1) / 2)}`,
            label: `Deneme-${startDeneme} + Deneme-${endDeneme}`,
            denemeNos: [startDeneme, endDeneme],
            questions: setQuestions
        });
    }

    let currentQuestions = [];
    let currentIndex = 0;
    let solvedIndex = -1;
    let userAnswers = {};
    let currentSetLabel = "";
    let currentSetKey = "";
    let finalReviewPool = [];
    let isFinalReviewMode = false;
    let finalReviewStarted = false;

    function getBaseQuestionsForSet(setKey) {
        const found = groupedSets.find(item => item.key === setKey);
        return found ? found.questions.map(item => ({ ...item })) : [];
    }

    function calculateStatsFromState(questionsArr, answersObj) {
        let solved = 0;
        let correct = 0;
        let wrong = 0;

        Object.keys(answersObj || {}).forEach(key => {
            const idx = Number(key);
            const q = questionsArr[idx];
            if (!q || q.isReasked) return;
            solved += 1;
            if (answersObj[idx] === q.c) {
                correct += 1;
            } else {
                wrong += 1;
            }
        });

        return { solved, correct, wrong };
    }
    function getDenemeNoFromQuestion(questionText) {
        const match = String(questionText || "").match(/^DENEME-(\d+)\s+/);
        return match ? parseInt(match[1], 10) : null;
    }

    function calculateDenemeStats(questionsArr, answersObj, denemeNo) {
        let solved = 0;
        let correct = 0;
        let wrong = 0;

        Object.keys(answersObj || {}).forEach(key => {
            const idx = Number(key);
            const q = questionsArr[idx];
            if (!q || q.isReasked) return;
            if (getDenemeNoFromQuestion(q.q) !== denemeNo) return;
            solved += 1;
            if (answersObj[idx] === q.c) {
                correct += 1;
            } else {
                wrong += 1;
            }
        });

        return { solved, correct, wrong };
    }

    function getSavedSetState(setKey, totalQuestions) {
        const raw = sessionStorage.getItem(`quizState_${setKey}`);
        const base = {
            currentQuestions: getBaseQuestionsForSet(setKey),
            currentIndex: 0,
            solvedIndex: -1,
            userAnswers: {},
            finalReviewPool: [],
            isFinalReviewMode: false,
            finalReviewStarted: false,
            stats: { solved: 0, correct: 0, wrong: 0, total: totalQuestions }
        };

        if (!raw) return base;

        try {
            const parsed = JSON.parse(raw);
            const currentQuestions = Array.isArray(parsed.currentQuestions) && parsed.currentQuestions.length
                ? parsed.currentQuestions
                : getBaseQuestionsForSet(setKey);
            const userAnswers = parsed.userAnswers && typeof parsed.userAnswers === 'object'
                ? parsed.userAnswers
                : {};
            const stats = calculateStatsFromState(currentQuestions, userAnswers);

            return {
                currentQuestions,
                currentIndex: Number.isInteger(parsed.currentIndex) ? parsed.currentIndex : 0,
                solvedIndex: Number.isInteger(parsed.solvedIndex) ? parsed.solvedIndex : -1,
                userAnswers,
                finalReviewPool: Array.isArray(parsed.finalReviewPool) ? parsed.finalReviewPool : [],
                isFinalReviewMode: !!parsed.isFinalReviewMode,
                finalReviewStarted: !!parsed.finalReviewStarted,
                stats: { ...stats, total: totalQuestions }
            };
        } catch (e) {
            return base;
        }
    }

    function saveCurrentSetState() {
        if (!currentSetKey) return;
        const state = {
            currentQuestions,
            currentIndex,
            solvedIndex,
            userAnswers,
            finalReviewPool,
            isFinalReviewMode,
            finalReviewStarted
        };
        sessionStorage.setItem(`quizState_${currentSetKey}`, JSON.stringify(state));
    }

    function clearCurrentSetState() {
        if (!currentSetKey) return;
        sessionStorage.removeItem(`quizState_${currentSetKey}`);
    }
    function resetCurrentSet() {
        if (!currentSetKey) return;
        const confirmReset = confirm("Bu denemenin istatistikleri ve ilerlemesi sıfırlansın mı?");
        if (!confirmReset) return;

        clearCurrentSetState();

        const chosen = groupedSets.find(item => item.key === currentSetKey);
        if (!chosen) return;

        currentQuestions = chosen.questions.map(item => ({ ...item }));
        currentIndex = 0;
        solvedIndex = -1;
        userAnswers = {};
        finalReviewPool = [];
        isFinalReviewMode = false;
        finalReviewStarted = false;
        loadQuestion();
    }

    function renderMenu() {
        menuGrid.innerHTML = "";
        groupedSets.forEach((set, idx) => {
            const savedState = getSavedSetState(set.key, set.questions.length);
            const deneme1 = set.denemeNos[0];
            const deneme2 = set.denemeNos[1];
            const stats1 = calculateDenemeStats(savedState.currentQuestions, savedState.userAnswers, deneme1);
            const stats2 = calculateDenemeStats(savedState.currentQuestions, savedState.userAnswers, deneme2);

            const btn = document.createElement('button');
            btn.className = 'menu-btn';
            btn.innerHTML = `
                <span class="title">${idx + 1}. Buton</span>
                <span class="meta">${set.label}
                    <span class="stats">
                        <span class="substats">Deneme-${deneme1} 30 soru (${stats1.solved} çözüldü · ${stats1.correct} doğru · ${stats1.wrong} yanlış)</span>
                        <span class="substats">Deneme-${deneme2} 30 soru (${stats2.solved} çözüldü · ${stats2.correct} doğru · ${stats2.wrong} yanlış)</span>
                    </span>
                </span>
            `;
            btn.onclick = () => startSet(idx);
            menuGrid.appendChild(btn);
        });
    }

    function startSet(setIndex) {
        const chosen = groupedSets[setIndex];
        currentSetKey = chosen.key;
        currentSetLabel = `${setIndex + 1}. Buton · ${chosen.label}`;
        setInfo.textContent = currentSetLabel;

        const savedState = getSavedSetState(chosen.key, chosen.questions.length);
        currentQuestions = savedState.currentQuestions;
        currentIndex = savedState.currentIndex;
        solvedIndex = savedState.solvedIndex;
        userAnswers = savedState.userAnswers;
        finalReviewPool = savedState.finalReviewPool || [];
        isFinalReviewMode = !!savedState.isFinalReviewMode;
        finalReviewStarted = !!savedState.finalReviewStarted;

        if (currentIndex >= currentQuestions.length) {
            currentIndex = Math.max(0, currentQuestions.length - 1);
        }

        menuContainer.style.display = 'none';
        quizContainer.style.display = 'block';
        loadQuestion();
    }

    function showMenu() {
        saveCurrentSetState();
        renderMenu();
        quizContainer.style.display = 'none';
        menuContainer.style.display = 'block';
    }

    function loadQuestion() {
        const q = currentQuestions[currentIndex];
        reaskBadge.style.display = q.isReasked ? 'inline-block' : 'none';
        reviewBanner.style.display = isFinalReviewMode ? 'block' : 'none';

        const splitIndex = q.q.indexOf(':');
        if (splitIndex !== -1) {
            const questionNumber = q.q.substring(0, splitIndex + 1);
            const questionText = q.q.substring(splitIndex + 1);
            questionEl.innerHTML = `${questionNumber}<br><span class="lesson-name">(${lessonTitle} / ${currentSetLabel})</span><br>${questionText}`;
        } else {
            questionEl.textContent = q.q;
        }

        optionsEl.innerHTML = '';
        explanationEl.style.display = 'none';
        updateStatusCounters();

        q.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;

            if (currentIndex <= solvedIndex) {
                btn.disabled = true;
                const answered = userAnswers[currentIndex];

                if (index === answered) {
                    if (answered === q.c) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                    }
                }

                const showSolution = (answered === q.c) || (q.isReasked && answered !== q.c);

                if (showSolution) {
                    if (index === q.c) {
                        btn.classList.add('correct');
                    }
                    explanationEl.innerHTML = `<strong>Çözüm:</strong> ${q.e}`;
                    explanationEl.style.display = 'block';
                }
            } else {
                btn.onclick = () => selectOption(index);
            }

            optionsEl.appendChild(btn);
        });

        updateNavButtons();
    }

    function selectOption(selectedIndex) {
        const q = currentQuestions[currentIndex];
        userAnswers[currentIndex] = selectedIndex;
        solvedIndex = Math.max(solvedIndex, currentIndex);

        const buttons = optionsEl.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        const isCorrect = (selectedIndex === q.c);

        if (isCorrect) {
            buttons[selectedIndex].classList.add('correct');
            explanationEl.innerHTML = `<strong>Çözüm:</strong> ${q.e}`;
            explanationEl.style.display = 'block';
        } else {
            buttons[selectedIndex].classList.add('wrong');

            const baseQuestionKey = q.originalQuestionKey || q.q;
            const alreadyInPool = finalReviewPool.some(item => (item.originalQuestionKey || item.q) === baseQuestionKey);

            if (!alreadyInPool && !isFinalReviewMode) {
                finalReviewPool.push({
                    q: q.q,
                    o: [...q.o],
                    c: q.c,
                    e: q.e,
                    originalQuestionKey: baseQuestionKey,
                    isFinalReviewItem: true
                });
            }

            if (!q.isReasked && !isFinalReviewMode) {
                explanationEl.style.display = 'none';
                let insertIndex = currentIndex + 6;
                if (insertIndex > currentQuestions.length) {
                    insertIndex = currentQuestions.length;
                }
                currentQuestions.splice(insertIndex, 0, {
                    ...q,
                    isReasked: true,
                    originalQuestionKey: baseQuestionKey
                });
            } else {
                buttons[q.c].classList.add('correct');
                explanationEl.innerHTML = `<strong>Çözüm:</strong> ${q.e}`;
                explanationEl.style.display = 'block';
            }
        }

        saveCurrentSetState();
        updateStatusCounters();
        updateNavButtons();
    }

    function updateStatusCounters() {
        statusText.textContent = `Soru: ${currentIndex + 1} / ${currentQuestions.length}`;
        const remaining = currentQuestions.length - (currentIndex + 1);
        remainingCountEl.textContent = `Kalan Soru: ${remaining}`;
    }

    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);

        if (currentIndex <= solvedIndex) {
            nextBtn.style.visibility = 'visible';
            if (currentIndex === currentQuestions.length - 1) {
                nextBtn.textContent = "Sınavı Bitir";
            } else {
                nextBtn.textContent = "Sonraki ❯";
            }
        } else {
            nextBtn.style.visibility = 'hidden';
        }
    }

    function goForward() {
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            saveCurrentSetState();
            loadQuestion();
        } else {
            if (!isFinalReviewMode && finalReviewPool.length > 0 && !finalReviewStarted) {
                const reviewStartIndex = currentQuestions.length;
                finalReviewPool.forEach(item => {
                    currentQuestions.push({
                        ...item,
                        isReasked: true,
                        isFinalReviewItem: true
                    });
                });
                isFinalReviewMode = true;
                finalReviewStarted = true;
                currentIndex = reviewStartIndex;
                saveCurrentSetState();
                loadQuestion();
                return;
            }

            alert("Tebrikler! Bu seti başarıyla tamamladınız.");
            clearCurrentSetState();
            showMenu();
        }
    }

    function goBack() {
        if (currentIndex > 0) {
            currentIndex--;
            saveCurrentSetState();
            loadQuestion();
        }
    }

    renderMenu();
</script>
</body>
</html>
